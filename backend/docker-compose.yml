version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: upscaler-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: ${APP_DEBUG:-false}
      UPLOAD_DIR: /app/data/uploads
      OUTPUT_DIR: /app/data/outputs
      DATABASE_URL: sqlite:////app/data/upscaler.db
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - upscaler_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Development variant — mounts source for hot reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: upscaler-api-dev
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: "true"
      UPLOAD_DIR: /app/data/uploads
      OUTPUT_DIR: /app/data/outputs
      DATABASE_URL: sqlite:////app/data/upscaler.db
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:1420"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    profiles:
      - dev

volumes:
  upscaler_data:
    driver: local
