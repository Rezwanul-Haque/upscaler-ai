version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: upscaler-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Development variant — mounts source for hot reload
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: upscaler-web-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://upscaler-api:8000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    profiles:
      - dev
